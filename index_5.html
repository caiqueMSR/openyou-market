<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>OpenYou Market — Lista</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;height:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:#f4f2f8;color:#f0eeff;height:100%;max-width:430px;margin:0 auto;font-size:14px;line-height:1.5;overflow-x:hidden;}
:root{
  --bg:#f4f2f8;
  --bg2:#edeaf5;
  --bg3:#e5e1f0;
  --surface:#ffffff;
  --surface2:#f8f6ff;
  --surface3:#efe9ff;
  --bdr:#ddd6f3;
  --bdr2:#c9bef0;
  --purple:#9333ea;
  --purple-dark:#7c3aed;
  --purple-lt:rgba(147,51,234,.15);
  --purple-glow:rgba(147,51,234,.30);
  --gold:#f59e0b;
  --gold-lt:rgba(245,158,11,.12);
  --gold-bright:#fbbf24;
  --text:#1a1535;
  --text2:#3d3466;
  --muted:#7c6fa0;
  --faint:#b0a8d0;
  --red:#ef4444;
  --red-lt:rgba(239,68,68,.12);
  --green:#22c55e;
  --green-lt:rgba(34,197,94,.12);
  --green-btn:#16a34a;
  --viena:#a855f7;--mirella:#f97316;--montana:#38bdf8;--flash:#4ade80;
  --viena-lt:rgba(168,85,247,.12);--mirella-lt:rgba(249,115,22,.12);
  --montana-lt:rgba(56,189,248,.12);--flash-lt:rgba(74,222,128,.12);
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 4px rgba(124,58,237,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(124,58,237,.12);
  --shadow-lg:0 8px 24px rgba(124,58,237,.15);
  --shadow-purple:0 4px 16px rgba(124,58,237,.25);
}

/* SYNC */
.sync-bar{height:2px;position:fixed;top:0;left:0;right:0;z-index:200;}
.sync-bar.syncing{background:var(--gold);animation:pulse 1s infinite;}
.sync-bar.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.offline{background:var(--red);}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite;}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;}
.search-icon{font-size:15px;color:var(--muted);}
.search-input{flex:1;border:none;outline:none;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:var(--text);background:transparent;}
.search-input::placeholder{color:var(--faint);}
.search-clear{font-size:14px;color:var(--muted);cursor:pointer;padding:2px 4px;}

/* INPUT */
.inp-box{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.inp-top-bar{height:3px;}
.inp-body{padding:14px;}
.inp-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
textarea.chat{width:100%;background:var(--surface2);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;resize:none;min-height:76px;outline:none;line-height:1.5;transition:border-color .15s;}
textarea.chat:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-lt);}
textarea.chat::placeholder{color:var(--faint);}
.hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4;}
.hint b{color:var(--gold);}
.btn-row{display:flex;gap:8px;margin-top:10px;}

/* BTN */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:var(--radius-sm);border:none;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:filter .12s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn-primary{flex:1;background:var(--purple);color:#fff;box-shadow:var(--shadow-purple);}
.btn-primary:hover{filter:brightness(1.12);}

/* CAT HEADER */
.cat-section{margin-bottom:20px;}
.cat-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(124,58,237,.06));
  border:1.5px solid rgba(124,58,237,.25);
  border-left:4px solid var(--purple);
  border-radius:var(--radius-sm);
  margin-bottom:8px;
  margin-top:4px;
}
.cat-icon{font-size:18px;}
.cat-name{font-size:12px;font-weight:800;color:var(--purple);flex:1;text-transform:uppercase;letter-spacing:.8px;}
.cat-count{font-size:11px;font-weight:800;color:#fff;background:var(--purple);border-radius:6px;padding:2px 8px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.sec-count{background:var(--surface);border:1px solid var(--bdr);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--text2);}

/* ICARD */
.icard{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);margin-bottom:6px;box-shadow:var(--shadow);animation:fadeUp .18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.icat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.iinfo{flex:1;min-width:0;}
.iname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.icat-label{font-size:11px;color:var(--muted);margin-top:1px;}
.iqty{font-size:18px;font-weight:800;flex-shrink:0;color:var(--gold);}
.iunit{font-size:11px;color:var(--muted);font-weight:400;}
.btn-edit{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--bdr);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .12s;}
.btn-edit:hover{background:var(--purple-lt);color:var(--purple);border-color:var(--purple);}
.btn-rm{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--bdr);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .12s;}
.btn-rm:hover{background:var(--red-lt);color:var(--red);border-color:var(--red);}
.btn-limpar-tudo{width:100%;margin-top:10px;padding:11px;border-radius:var(--radius-sm);border:1px solid rgba(239,68,68,.3);background:var(--red-lt);color:var(--red);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
.btn-wpp-loja{width:100%;margin-top:6px;padding:11px;border-radius:var(--radius-sm);border:none;background:#128c7e;color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-text{font-size:13px;line-height:1.7;color:var(--muted);}

/* PREVIEW */
.preview-box{background:var(--purple-lt);border:1px solid var(--bdr2);border-radius:var(--radius-sm);padding:14px;margin-top:10px;}
.preview-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--purple);margin-bottom:10px;}
.preview-item{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr);gap:8px;font-size:13px;}
.preview-item:last-of-type{border-bottom:none;}
.prev-name{flex:1;color:var(--text);}
.prev-qty{font-weight:800;color:var(--gold);}
.prev-unit{color:var(--muted);font-size:11px;}
.prev-rm{width:20px;height:20px;border-radius:4px;border:1px solid var(--bdr);background:var(--bg2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;}
.preview-actions{display:flex;gap:8px;margin-top:10px;}
.btn-confirm{flex:1;padding:10px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-cancel{padding:10px 14px;background:var(--surface2);color:var(--muted);border:1px solid var(--bdr);border-radius:var(--radius-sm);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:600;cursor:pointer;}

/* COMPRAS */
.compras-header{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.compras-header-left strong{display:block;font-size:16px;font-weight:700;color:var(--text);}
.compras-header-left span{font-size:12px;color:var(--muted);}
.btn-atualizar{display:flex;align-items:center;gap:5px;padding:10px 14px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-purple);}
.progress-bar{height:3px;background:var(--bdr);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));border-radius:2px;transition:width .4s ease;}
.total-box{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.total-label{font-size:12px;color:var(--muted);font-weight:600;}
.total-val{font-size:28px;font-weight:800;color:var(--gold);letter-spacing:-.5px;}

/* CITEM */
.citem{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;box-shadow:var(--shadow);animation:fadeUp .18s ease;}
.citem.got{background:var(--green-lt);border-color:rgba(34,197,94,.3);}
.citem-top{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--bdr2);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff;transition:all .15s;}
.citem.got .check-circle{background:var(--green);border-color:var(--green);}
.citem-name{font-size:14px;font-weight:500;flex:1;color:var(--text);}
.citem.got .citem-name{text-decoration:line-through;color:var(--muted);}
.citem-total{font-size:16px;font-weight:800;color:var(--gold);flex-shrink:0;}
.citem.got .citem-total{color:var(--muted);}
.citem-unit{font-size:11px;color:var(--muted);}
.citem-bottom{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--bdr);flex-wrap:wrap;}
.chips{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;border:1px solid;}
.chip[data-l="viena"]{color:var(--viena);border-color:rgba(168,85,247,.3);background:var(--viena-lt);}
.chip[data-l="mirella"]{color:var(--mirella);border-color:rgba(249,115,22,.3);background:var(--mirella-lt);}
.chip[data-l="montana"]{color:var(--montana);border-color:rgba(56,189,248,.3);background:var(--montana-lt);}
.chip[data-l="flash"]{color:var(--flash);border-color:rgba(74,222,128,.3);background:var(--flash-lt);}
.price-inline{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.price-curr{font-size:11px;color:var(--muted);font-weight:600;}
.price-inp{width:70px;padding:5px 8px;border:1px solid var(--bdr);border-radius:var(--radius-sm);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:700;color:var(--purple);background:var(--surface2);outline:none;text-align:right;}
.price-inp:focus{border-color:var(--gold);}
.price-sub{font-size:12px;font-weight:700;color:var(--green);min-width:60px;text-align:right;}
.btn-pendente{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid rgba(245,158,11,.3);background:var(--gold-lt);color:var(--gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.btn-pendente:hover,.btn-pendente.ativo{background:var(--gold);color:#fff;border-color:var(--gold);}
.done-banner{background:var(--green-lt);border:1px solid rgba(34,197,94,.3);border-radius:var(--radius);text-align:center;padding:18px;margin-top:10px;font-size:14px;color:var(--green);font-weight:700;}
.btn-salvar-compra{width:100%;padding:14px;margin-top:10px;border-radius:var(--radius-sm);border:none;background:var(--purple);color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:var(--shadow-purple);letter-spacing:.2px;}
.btn-reset{width:100%;padding:10px;margin-top:6px;border-radius:var(--radius-sm);border:1px solid var(--bdr);background:transparent;color:var(--muted);font-family:'Inter',system-ui,sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;}
.exp-bar{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);}
.btn-exp{flex:1;padding:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--bdr);border-radius:var(--radius-sm);font-family:'Inter',system-ui,sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;text-align:center;}

/* ESTOQUE */
.estoque-header{border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.estoque-title{font-size:16px;font-weight:700;color:var(--text);}
.estoque-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.btn-add-estoque{padding:10px 14px;color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Inter',system-ui,sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:var(--purple);box-shadow:var(--shadow-purple);}
.estoque-item{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.estoque-info{flex:1;min-width:0;}
.estoque-nome{font-size:14px;font-weight:500;color:var(--text);}
.estoque-cat{font-size:11px;color:var(--muted);}
.estoque-controles{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-qty{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--bdr);background:var(--surface2);color:var(--text2);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.btn-qty:hover{border-color:var(--purple);color:var(--purple);}
.qty-display{font-size:18px;font-weight:800;color:var(--gold);min-width:32px;text-align:center;}
.estoque-unit{font-size:11px;color:var(--muted);}

/* PENDENTES */
.pend-header{border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--gold-lt);border:1px solid rgba(245,158,11,.25);}
.pend-header-left strong{display:block;font-size:16px;font-weight:700;color:var(--gold);}
.pend-header-left span{font-size:12px;color:var(--muted);}
.btn-limpar-pendentes{padding:9px 13px;background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.pend-item{background:var(--surface);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.pend-item-info{flex:1;min-width:0;}
.pend-item-nome{font-size:14px;font-weight:600;color:var(--gold);}
.pend-item-cat{font-size:11px;color:var(--muted);margin-top:1px;}
.pend-item-qty{font-size:18px;font-weight:800;color:var(--gold);flex-shrink:0;}
.pend-item-unit{font-size:11px;color:var(--muted);}
.btn-despend{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--bdr);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.btn-despend:hover{background:var(--green-lt);color:var(--green);}
.estoque-aviso{font-size:12px;color:var(--muted);padding:5px 0 3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.citem-comprar{font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap;}
.citem-comprar-zero{color:var(--green);}
.pendentes-banner{background:var(--gold-lt);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius);padding:13px;margin-top:10px;}
.pendentes-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.btn-copiar-pendentes{font-size:12px;font-weight:700;color:var(--gold);background:transparent;border:1px solid var(--gold);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;}

/* HISTÓRICO */
.hist-header{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.hist-header-title{font-size:16px;font-weight:700;color:var(--text);}
.hist-header-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.hist-date-group{margin-bottom:16px;}
.hist-date-label{font-size:12px;font-weight:700;color:var(--muted);padding:8px 0 5px;border-bottom:1px solid var(--bdr);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.hist-date-badge{background:var(--surface2);border:1px solid var(--bdr);border-radius:5px;padding:2px 8px;font-size:10px;color:var(--muted);}
.hist-entry{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:13px 14px;margin-bottom:6px;box-shadow:var(--shadow);}
.hist-entry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:8px;}
.hist-loja-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;flex-shrink:0;}
.hist-entry-time{font-size:11px;color:var(--muted);flex:1;}
.hist-entry-total{font-size:18px;font-weight:800;color:var(--gold);}
.hist-entry-sub{font-size:12px;color:var(--muted);}
.hist-expand{font-size:11px;color:var(--purple);cursor:pointer;margin-top:6px;font-weight:600;display:inline-block;}
.hist-details{margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);display:none;}
.hist-details.open{display:block;}
.hist-detail-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid var(--bdr);}
.hist-detail-row:last-child{border-bottom:none;}
.hist-detail-name{flex:1;color:var(--text2);}
.hist-detail-qty{color:var(--muted);margin:0 8px;font-size:11px;}
.hist-detail-price{font-weight:700;color:var(--gold);}

/* DASHBOARD */
.dash-section{margin-bottom:18px;}
.dash-section-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.kpi-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.kpi-card.highlight{background:linear-gradient(135deg,var(--purple-dark),var(--purple));border-color:transparent;}
.kpi-card.highlight .kpi-label{color:rgba(255,255,255,.65);}
.kpi-card.highlight .kpi-value{color:#fff;}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;}
.kpi-value{font-size:26px;font-weight:800;color:var(--gold);letter-spacing:-.5px;line-height:1;}
.kpi-sub{font-size:11px;margin-top:5px;}
.kpi-up{color:var(--red);}
.kpi-down{color:var(--green);}
.kpi-eq{color:var(--muted);}
.cat-bar-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cat-bar-label{font-size:12px;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.cat-bar-val{font-size:11px;font-weight:700;color:var(--gold);width:62px;text-align:right;flex-shrink:0;}

// ── BUSCA NO BANCO DE PRODUTOS (votação por maioria) ──
function getCatFromDB(digitado){
  const d=digitado.toLowerCase().trim();
  // 1. Exata
  if(PRODUCT_DB[d])return PRODUCT_DB[d];
  // 2. Nome começa com o digitado — votação
  const starts=Object.entries(PRODUCT_DB).filter(([n])=>n.startsWith(d+' ')||n===d);
  if(starts.length){
    const cnt={};starts.forEach(([,c])=>cnt[c]=(cnt[c]||0)+1);
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
  }
  // 3. Digitado contido em nome — votação por maioria
  const contains=Object.entries(PRODUCT_DB).filter(([n])=>n.includes(d));
  if(contains.length){
    const cnt={};contains.forEach(([,c])=>cnt[c]=(cnt[c]||0)+1);
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
  }
  // 4. Por palavras — votação
  const palavras=d.split(/\s+/).filter(p=>p.length>3);
  if(palavras.length){
    const scored=[];
    Object.entries(PRODUCT_DB).forEach(([n,c])=>{
      const score=palavras.reduce((a,p)=>a+(n.includes(p)?1:0),0);
      if(score>0)scored.push([score,c]);
    });
    if(scored.length){
      const best=Math.max(...scored.map(([s])=>s));
      const cnt={};scored.filter(([s])=>s===best).forEach(([,c])=>cnt[c]=(cnt[c]||0)+1);
      return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
    }
  }
  return 'Mercearia';
}

// ── PARSER ──
// Funções globais de normalização de texto e busca de estoque
const PALAVRAS_GENERICAS=new Set(['fardo','caixa','pacote','unidade','litro','frasco','garrafa','lata','pote','saco','rolo','par','kit']);
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
function palavrasEspecificas(nome){return norm(nome).split(/\s+/).filter(p=>p.length>2&&!PALAVRAS_GENERICAS.has(p));}
function encontrarEstoque(it){
  const nl=norm(it.nome);const esp=palavrasEspecificas(it.nome);
  let f=estoque.find(e=>norm(e.nome)===nl);if(f)return f;
  if(esp.length){f=estoque.find(e=>esp.every(p=>norm(e.nome).includes(p)));if(f)return f;}
  if(esp.length>=2){f=estoque.find(e=>esp.filter(p=>norm(e.nome).includes(p)).length>=Math.ceil(esp.length*0.8));if(f)return f;}
  return null;
}
const UNITS=["kg","g","ml","l","lt","cx","pct","dz","un","gr","lata","pacote","caixa","duzia","garrafa","litro","litros"];
function parseQty(t){return parseFloat(t.replace(',','.'))||0;}
function parseUnit(t){
  const l=t.toLowerCase().replace('.','');
  const m={lt:'L',litro:'L',litros:'L',l:'L',gr:'g',grama:'g',gramas:'g',pacote:'pct',caixa:'cx',duzia:'dz',garrafa:'un',lata:'un'};
  return m[l]||(UNITS.includes(l)?l:null);
}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1).toLowerCase();}
function normalizeName(raw){
  // Preserva o nome exato — só capitaliza primeira letra de cada palavra
  return raw.trim().split(' ').filter(Boolean).map((w,i)=>i===0?capitalize(w):w).join(' ');
}
function parseList(text){
  const results=[];
  const chunks=text.split(/[,;\n]+/).map(c=>c.trim()).filter(Boolean);
  for(const chunk of chunks){
    const tokens=chunk.trim().split(/\s+/);
    let qty=1,unit='un',nameParts=[],i=0;
    if(tokens[0]&&/^\d+[,.]?\d*$/.test(tokens[0])){
      qty=parseQty(tokens[0]);i=1;
      if(tokens[1]){const u=parseUnit(tokens[1]);if(u){unit=u;i=2;}}
      nameParts=tokens.slice(i);
    }else{
      let qi=-1;
      for(let j=tokens.length-1;j>=0;j--){if(/^\d+[,.]?\d*$/.test(tokens[j])){qi=j;break;}}
      if(qi>=0){
        qty=parseQty(tokens[qi]);
        let ai=qi+1;
        if(tokens[ai]){const u=parseUnit(tokens[ai]);if(u){unit=u;ai++;}}
        const s=tokens[qi].match(/^(\d+[,.]?\d*)(kg|g|ml|l|lt|un|cx|pct|gr)$/i);
        if(s){qty=parseQty(s[1]);unit=parseUnit(s[2])||s[2];}
        nameParts=[...tokens.slice(0,qi),...tokens.slice(ai)];
      }else{
        const si=tokens.findIndex(t=>/^\d+[,.]?\d*(kg|g|ml|l|lt|un|cx|pct|gr)$/i.test(t));
        if(si>=0){const s=tokens[si].match(/^(\d+[,.]?\d*)(kg|g|ml|l|lt|un|cx|pct|gr)$/i);qty=parseQty(s[1]);unit=parseUnit(s[2])||s[2];nameParts=tokens.filter((_,j)=>j!==si);}
        else nameParts=tokens;
      }
    }
    const rawName=nameParts.join(' ').replace(/^-+|-+$/g,'').trim();
    if(!rawName||rawName.length<2)continue;
    // Preserva o nome como digitado, só capitaliza primeira letra
    const nome=normalizeName(rawName);
    if(!nome||nome.length<2)continue;
    results.push({nome,qtd:qty||1,unidade:unit});
  }
  return results;
}

// ── CONSOLIDAÇÃO ──
function consolidarLocalmente(){
  const todos=[];
  LOJAS.forEach(l=>estado[l].forEach(item=>todos.push({...item,loja:l})));
  if(!todos.length)return[];
  const grupos={};
  todos.forEach(item=>{
    const key=item.nome.toLowerCase().trim()+'|'+item.unidade;
    if(!grupos[key])grupos[key]={nome:item.nome,categoria:item.categoria||'Mercearia',unidade:item.unidade,total:0,lojas:{viena:0,mirella:0,montana:0,flash:0}};
    grupos[key].total+=item.qtd;
    grupos[key].lojas[item.loja]=(grupos[key].lojas[item.loja]||0)+item.qtd;
  });
  const catOrder=Object.keys(CATS);
  return Object.values(grupos).sort((a,b)=>{
    const ci=catOrder.indexOf(a.categoria)-catOrder.indexOf(b.categoria);
    return ci!==0?ci:a.nome.localeCompare(b.nome,'pt-BR');
  });
}

function sortItems(items){
  const catOrder=Object.keys(CATS);
  return[...items].sort((a,b)=>{
    const ci=catOrder.indexOf(a.categoria||'Mercearia')-catOrder.indexOf(b.categoria||'Mercearia');
    return ci!==0?ci:a.nome.localeCompare(b.nome,'pt-BR');
  });
}

// ── SYNC STATUS ──
function setSyncStatus(s){
  const bar=document.getElementById('syncBar');
  const dot=document.getElementById('syncDot');
  if(!bar||!dot)return;
  bar.className='sync-bar '+(s==='syncing'?'syncing':s==='error'?'error':'');
  dot.className='sync-dot '+(s==='syncing'?'syncing':s==='error'?'offline':'');
}

// ── FIREBASE SAVE ──
let saveTimer=null;
function salvar(immediate=false){
  if(saveTimer)clearTimeout(saveTimer);
  if(immediate){_doSave();}else{saveTimer=setTimeout(_doSave,500);}
}
async function _doSave(){
  if(isSaving)return;
  isSaving=true;setSyncStatus('syncing');
  try{
    await setDoc(DOC,{estado,consolidado,checklist,draftTexts,historico,estoque,estoqueFlash,precoHistorico,validades,updatedAt:Date.now(),deviceId:DEVICE_ID,appVersion:APP_VERSION},{merge:false});
    setSyncStatus('ok');
  }catch(e){
    console.error(e);setSyncStatus('error');
    try{localStorage.setItem('lm6_bk',JSON.stringify({estado,consolidado,checklist,draftTexts,historico,estoque,estoqueFlash,precoHistorico,validades,updatedAt:Date.now()}));}catch(_){}
  }finally{isSaving=false;}
}

function iniciarSync(){
  setSyncStatus('syncing');showLoader(true);
  onSnapshot(DOC,(snap)=>{
    showLoader(false);
    if(snap.exists()){
      const d=snap.data();
      // PROTEÇÃO DE VERSÃO: ignorar dados de versões mais antigas
      const versaoFirebase=d.appVersion||0;
      if(versaoFirebase<APP_VERSION&&versaoFirebase>0){
        setSyncStatus('ok');updateBadges();
        if(!window._firstLoadDone){window._firstLoadDone=true;render();}
        console.warn(`Firebase versão ${versaoFirebase} < app versão ${APP_VERSION} — dados locais preservados.`);
        return;
      }

      // Verificar se o localStorage tem dados mais recentes (salvo offline)
      let dadosFirebase=d;
      try{
        const bk=localStorage.getItem('lm6_bk');
        if(bk){
          const local=JSON.parse(bk);
          const tsFirebase=d.updatedAt||0;
          const tsLocal=local.updatedAt||0;
          // Se localStorage é mais recente que Firebase, usar dados locais
          if(tsLocal>tsFirebase){
            console.log(`localStorage (${new Date(tsLocal).toLocaleTimeString()}) mais recente que Firebase (${new Date(tsFirebase).toLocaleTimeString()}) — usando backup local`);
            dadosFirebase={...d,...local};
            // Re-salvar dados locais no Firebase
            setTimeout(()=>salvar(true),1000);
          }
        }
      }catch(_){}

      const meuSave=dadosFirebase.deviceId===DEVICE_ID;
      LOJAS.forEach(l=>{
        if(Array.isArray(dadosFirebase.estado?.[l]))estado[l]=dadosFirebase.estado[l];
        if(typeof dadosFirebase.draftTexts?.[l]==='string')draftTexts[l]=dadosFirebase.draftTexts[l];
      });
      if(Array.isArray(dadosFirebase.consolidado))consolidado=dadosFirebase.consolidado;
      if(dadosFirebase.checklist&&typeof dadosFirebase.checklist==='object')checklist=dadosFirebase.checklist;
      if(Array.isArray(dadosFirebase.historico))historico=dadosFirebase.historico;
      if(Array.isArray(dadosFirebase.estoque))estoque=dadosFirebase.estoque;
      if(Array.isArray(dadosFirebase.estoqueFlash))estoqueFlash=dadosFirebase.estoqueFlash;
      if(dadosFirebase.precoHistorico&&typeof dadosFirebase.precoHistorico==='object')precoHistorico=dadosFirebase.precoHistorico;
      if(Array.isArray(dadosFirebase.validades))validades=dadosFirebase.validades;
      setSyncStatus('ok');updateBadges();
      _fbOk=true;if(!meuSave||!window._firstLoadDone){window._firstLoadDone=true;render();}
    }else{
      setSyncStatus('ok');render();
    }
  },(err)=>{
    console.error(err);setSyncStatus('error');showLoader(false);
    try{
      const s=localStorage.getItem('lm6_bk');
      if(s){const d=JSON.parse(s);LOJAS.forEach(l=>{if(Array.isArray(d.estado?.[l]))estado[l]=d.estado[l];if(typeof d.draftTexts?.[l]==='string'&&d.draftTexts[l])draftTexts[l]=d.draftTexts[l];});if(Array.isArray(d.consolidado))consolidado=d.consolidado;if(d.checklist)checklist=d.checklist;if(Array.isArray(d.historico))historico=d.historico;if(Array.isArray(d.estoque))estoque=d.estoque;if(Array.isArray(d.estoqueFlash))estoqueFlash=d.estoqueFlash;if(Array.isArray(d.validades))validades=d.validades;}
    }catch(_){}
    updateBadges();render();
  });
}

// ── TABS ──
function navTo(l){closeSidebar();
  if(LOJAS.includes(aba)){const el=document.getElementById('chatInput');if(el)draftTexts[aba]=el.value;}
  if(previewItems.length&&LOJAS.includes(aba))autoConfirmarPreview(aba);
  // Limpar busca da aba anterior
  if(buscas[aba]!==undefined)buscas[aba]='';
  aba=l;
  document.querySelectorAll('.nav-item').forEach(t=>t.classList.toggle('active',t.dataset.l===l));
  render();
}
function autoConfirmarPreview(loja){
  previewItems.forEach(item=>{
    const idx=estado[loja].findIndex(e=>e.nome.toLowerCase().trim()===item.nome.toLowerCase().trim()&&e.unidade===item.unidade);
    if(idx>=0)estado[loja][idx].qtd+=item.qtd;
    else estado[loja].push({...item});
  });
  previewItems=[];salvar();updateBadges();
}
function updateBadges(){
  LOJAS.forEach(l=>{const el=document.getElementById('n-'+l);if(el)el.textContent=estado[l].length;});
  // Atualizar sub do sidebar
  const total=LOJAS.reduce((a,l)=>a+estado[l].length,0);
  const sub=document.getElementById('sidebarSub');
  if(sub)sub.textContent=`${total} item${total!==1?'s':''} nas listas · ${getSemana()}`;
}

  const done=consolidado.filter((_,i)=>checklist[i]?.status==='got').length;
  const pct=consolidado.length?Math.round(done/consolidado.length*100):0;
  let totalGasto=0;

  const q=buscas.compras||'';

  let html=`
  <div class="compras-header">
    <div class="compras-header-left">
      <strong>🛒 Compras</strong>
      <span>${LOJAS.filter(l=>estado[l].length>0).length} loja(s) · ${total} itens cadastrados</span>
    </div>

    m.innerHTML=html+`<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Adicione itens nas lojas primeiro,<br>depois clique em Atualizar.</div></div>`;

    return;

  html+=`
  <div class="progress-wrap">
    <div class="progress-stats">
      <div>
        <div class="progress-label">Progresso da compra</div>
        <div class="progress-segments">
          <div class="prog-seg"><div class="prog-dot comprado"></div><span id="prog-comprados">0 comprados</span></div>
          <div class="prog-seg"><div class="prog-dot pendente"></div><span id="prog-pendentes-count">0 pendentes</span></div>

        </div>

    </div>

      });
      html+=`</div>`;
    });
  }

  if(done===consolidado.length&&consolidado.length>0)html+=`<div class="done-banner">🎉 Tudo marcado! Total: R$ ${totalGasto.toFixed(2).replace('.',',')}</div>`;

  html+='</div>'; // fecha lista-compras

  // Banner de pendentes
  const pendentes=consolidado.filter((_,i)=>checklist[i]?.status==='pending');
  if(pendentes.length>0){
    html+=`<div class="pendentes-banner">
      <div class="pendentes-title">
        ⚠️ ${pendentes.length} item${pendentes.length!==1?'s':''} pendente${pendentes.length!==1?'s':''}
        <button class="btn-copiar-pendentes" onclick="copiarPendentes()">📋 Copiar lista</button>
      </div>
      ${pendentes.map(it=>`<div class="pendentes-item"><span>${it.nome}</span><span style="color:var(--muted);font-size:11px">${it.total} ${it.unidade}</span></div>`).join('')}
    </div>`;
  }
  html+=`
  <div class="exp-bar">
    <button class="btn-exp" onclick="copiarLista()">📋 Copiar</button>
    <button class="btn-exp" onclick="abrirWhatsApp()">📱 WhatsApp</button>
  </div>
  <button class="btn-salvar-compra" onclick="salvarCompraNoHistorico()">💾 Salvar compra no histórico</button>
  <button class="btn-reset" onclick="resetCheck()">↺ Reiniciar marcações</button>`;

  m.innerHTML=html;
  updateProgresso();
}

// ── RENDER ESTOQUE ──
function renderEstoque(m, tipo='casa'){
  const isFlash = tipo==='flash';
  const dados = isFlash ? estoqueFlash : estoque;
  const searchId = isFlash ? 'search-estoque-flash' : 'search-estoque';
  const q=(isFlash?buscas['estoque-flash']:buscas.estoque)||'';
  const itens=q?dados.filter(e=>e.nome.toLowerCase().includes(q.toLowerCase())):dados;

  const cor = isFlash ? '#e65100' : 'var(--blue)';
  const corLt = isFlash ? '#fff3e0' : 'var(--blue-lt)';
  const corBdr = isFlash ? '#ffcc02' : '#90caf9';
  const titulo = isFlash ? '⚡ Estoque Flash' : '📦 Estoque Casa';
  const placeholder = isFlash ? 'Pesquisar no estoque Flash...' : 'Pesquisar no estoque...';
  const addFn = isFlash ? 'abrirAddEstoqueFlash()' : 'abrirAddEstoque()';

  let html=`
  <div class="estoque-header" style="background:${corLt};border-color:${corBdr}">
    <div>
      <div class="estoque-title" style="color:${cor}">${titulo}</div>
      <div class="estoque-sub">${dados.length} produto${dados.length!==1?'s':''} em estoque${isFlash?' · Armário Flash':' · Estoque Casa'}</div>
    </div>
    <button class="btn-add-estoque" style="background:${cor}" onclick="${addFn}">+ Adicionar</button>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="${searchId}" class="search-input" type="text" placeholder="${placeholder}" value="${q}"
      oninput="${isFlash?'filtrarEstoqueFlash':'filtrarEstoque'}(this.value)">
    ${q?`<span class="search-clear" onclick="${isFlash?'limparBuscaEstoqueFlash':'limparBuscaEstoque'}()">✕</span>`:''}
  </div>`;

  html+=`<div id="lista-estoque-${isFlash?'flash':'casa'}">`;
  if(dados.length===0){
    html+=`<div class="empty"><div class="empty-icon">${isFlash?'⚡':'📦'}</div><div class="empty-text">Nenhum produto em estoque.<br>Clique em + Adicionar para registrar.</div></div>`;
  }else if(itens.length===0){
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum resultado para "<b>${q}</b>".</div></div>`;
  }else{
    const catOrder=Object.keys(CATS);
    const sorted=[...itens].sort((a,b)=>{
      const ci=catOrder.indexOf(a.categoria||'Mercearia')-catOrder.indexOf(b.categoria||'Mercearia');
      return ci!==0?ci:a.nome.localeCompare(b.nome,'pt-BR');
    });
    const byCat={};
    sorted.forEach(item=>{const cat=item.categoria||'Mercearia';if(!byCat[cat])byCat[cat]=[];byCat[cat].push(item);});
    Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
      const cd=CATS[cat]||{icon:'🏪'};
      html+=`<div class="cat-section"><div class="cat-header"><div class="cat-icon">${cd.icon}</div><div class="cat-name">${cat}</div><div class="cat-count">${byCat[cat].length}</div></div>`;
      byCat[cat].forEach(item=>{
        const origIdx=dados.findIndex(e=>e.id===item.id);
        const ajFn = isFlash ? 'ajustarEstoqueFlash' : 'ajustarEstoque';
        const remFn = isFlash ? 'remEstoqueFlash' : 'remEstoque';
        html+=`<div class="estoque-item">

// ── RENDER HISTÓRICO ──
function renderHist(m){
  let html=`<div class="hist-header"><div class="hist-header-title">📋 Histórico de Compras</div><div class="hist-header-sub">${historico.length} registro${historico.length!==1?'s':''}</div></div>`;
  if(!historico.length){m.innerHTML=html+`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhum histórico ainda.<br>Salve uma compra ou limpe uma lista.</div></div>`;return;}
  const sorted=[...historico].sort((a,b)=>b.dataTs-a.dataTs);
  const porData={};
  sorted.forEach(e=>{const d=new Date(e.dataTs).toLocaleDateString('pt-BR');if(!porData[d])porData[d]=[];porData[d].push(e);});
  Object.entries(porData).forEach(([data,entries])=>{
    const totalDia=entries.reduce((a,e)=>a+(e.total||0),0);
    html+=`<div class="hist-date-group"><div class="hist-date-label">📅 ${data}<span class="hist-date-badge">${entries.length} registro${entries.length!==1?'s':''} · R$ ${totalDia.toFixed(2).replace('.',',')}</span></div>`;
    entries.forEach(entry=>{
      const lc=LCORES[entry.loja]||'var(--green)';
      const lb=LBGS[entry.loja]||'var(--green-lt)';
      const hora=new Date(entry.dataTs).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      html+=`<div class="hist-entry">
        <div class="hist-entry-top">
          <div class="hist-loja-tag" style="color:${lc};background:${lb};border:1px solid ${lc}40">${entry.loja?LNOMES[entry.loja]:entry.tipo==='compra'?'Compra Geral':'Lista'}</div>
          <div class="hist-entry-time">${hora}</div>
          <div class="hist-entry-total">R$ ${(entry.total||0).toFixed(2).replace('.',',')}</div>
        </div>
        <div class="hist-entry-sub">${entry.itens?.length||0} item${(entry.itens?.length||0)!==1?'s':''} · ${entry.tipo==='compra'?'Compra finalizada':'Lista limpa'}</div>
        <span class="hist-expand" onclick="toggleHistDetail('${entry.id}')">▼ Ver itens</span>
        <div class="hist-details" id="hd-${entry.id}">
          ${(entry.itens||[]).map(it=>`<div class="hist-detail-row"><span class="hist-detail-name">${it.nome}</span><span class="hist-detail-qty">${it.qtd||it.total||1} ${it.unidade||'un'}</span><span class="hist-detail-price">${it.preco?'R$ '+(it.preco*(it.qtd||it.total||1)).toFixed(2).replace('.',','):'-'}</span></div>`).join('')}
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  m.innerHTML=html;
}

function renderListaCompras(){
  const q=buscas.compras||'';
  const container=document.getElementById('lista-compras');
  if(!container)return;
  const filtered=consolidado
    .filter((_,i)=>checklist[i]?.status!=='pending')
    .filter(it=>!q||it.nome.toLowerCase().includes(q.toLowerCase()));
  const catOrder=Object.keys(CATS);
  const byCat={};
  filtered.forEach((it,_)=>{
    const realIdx=consolidado.indexOf(it);
    if(!byCat[it.categoria])byCat[it.categoria]=[];
    byCat[it.categoria].push({...it,idx:realIdx});
  });

  let html='';
  if(filtered.length===0){
    html=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum resultado${q?' para "<b>'+q+'</b>"':''}.</div></div>`;
  }else{
    Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
      const cd=CATS[cat]||{icon:'🏪'};
      html+=`<div class="cat-section"><div class="cat-header"><div class="cat-icon">${cd.icon}</div><div class="cat-name">${cat}</div><div class="cat-count">${byCat[cat].length}</div></div>`;
      byCat[cat].forEach(it=>{
        const got=checklist[it.idx]?.status==='got';
        const pending=checklist[it.idx]?.status==='pending';
        const preco=checklist[it.idx]?.preco||'';
        const sub=preco&&it.total?(preco*it.total).toFixed(2).replace('.',','):'';
        const chips=LOJAS.filter(l=>it.lojas[l]>0).map(l=>`<div class="chip" data-l="${l}">${LNOMES[l]}: ${it.lojas[l]}</div>`).join('');
        // Histórico de preço
        const ph=getUltimoPreco(it.nome);
        let precoHintHtml='';
        if(ph&&ph.anterior){
          const diff=ph.atual&&ph.anterior?((ph.atual-ph.anterior)/ph.anterior*100):null;
          const cls=diff===null?'preco-hist-eq':diff>0?'preco-hist-up':diff<0?'preco-hist-down':'preco-hist-eq';
          const seta=diff===null?'':diff>0?'↑':diff<0?'↓':'=';
          precoHintHtml='<div class="preco-hist">Último: <span class="preco-hist-val">R$ '+ph.anterior.toFixed(2).replace('.',',')+'</span>'+(diff!==null?('<span class="'+cls+'"> '+seta+Math.abs(diff).toFixed(1)+'%</span>'):'')+'</div>';
        }
        // Estoque
        const estoqueItem=encontrarEstoque(it);
        const qtdEstoque=estoqueItem?estoqueItem.qtd:0;
        const unEstoque=estoqueItem?estoqueItem.unidade||'un':'un';
        const mesmaUnidade=norm(unEstoque)===norm(it.unidade||'un');
        const qtdComprar=mesmaUnidade?Math.max(0,it.total-qtdEstoque):null;
        const temEstoque=qtdEstoque>0;
        html+=`<div class="citem ${got?'got':''}" id="ci-${it.idx}">
          <div class="citem-top" onclick="toggleCheck(${it.idx})">
            <div class="check-circle">${got?'✓':''}</div>
            <div class="citem-name">${it.nome}</div>
            <div style="text-align:right;flex-shrink:0">
              <div><span class="citem-total">${it.total}</span><span class="citem-unit"> ${it.unidade}</span></div>
              ${temEstoque?('<div class="citem-comprar '+(qtdComprar===0?'citem-comprar-zero':'')+'">'+(mesmaUnidade?(qtdComprar===0?'✓ estoque ok':'comprar: '+qtdComprar):'📦 ver estoque')+'</div>'):''}
            </div>
            <button class="btn-pendente ${pending?'ativo':''}" onclick="event.stopPropagation();marcarPendente(${it.idx})" title="Marcar como pendente">⚠</button>
          </div>
          ${temEstoque?('<div class="estoque-aviso">📦 Estoque: <b>'+qtdEstoque+' '+unEstoque+'</b>'+(!mesmaUnidade?' <span style="color:var(--muted);font-size:11px">(unidade diferente)</span>':qtdComprar===0?' — <b style="color:var(--green)">não precisa comprar!</b>':'  → comprar apenas <b>'+qtdComprar+'</b>')+'</div>'):''}
          <div class="citem-bottom">
            <div class="chips">${chips}</div>
            <div style="flex-shrink:0">
              ${precoHintHtml}
              <div class="price-inline">
                <span class="price-curr">R$</span>
                <input class="price-inp" type="number" step="0.01" min="0" placeholder="0,00"
                  value="${preco}" id="pi-${it.idx}"
                  onblur="updatePreco(${it.idx},this.value)"
                  onchange="updatePreco(${it.idx},this.value)">
                <div class="price-sub" id="sub-${it.idx}">${sub?'= R$ '+sub:''}</div>
              </div>
            </div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
  }
  container.innerHTML=html;
}

function saveDraft(loja){
  const el=document.getElementById('chatInput');
  if(!el)return;
  draftTexts[loja]=el.value;
  // Persistir no Firebase com debounce de 1.5s para não sobrecarregar
  clearTimeout(window._draftTimer);
  window._draftTimer=setTimeout(()=>salvar(),1500);
}
function handleKey(e){if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))processarInput();}

function processarInput(){
  const el=document.getElementById('chatInput');if(!el)return;
  const txt=el.value.trim();
  if(!txt){showToast('Digite algo primeiro.',true);return;}
  const parsed=parseList(txt);
  if(!parsed.length){showToast('Não entendi. Tente novamente.',true);return;}
  // Usar banco de dados para categoria
  parsed.forEach(it=>{it.categoria=getCatFromDB(it.nome);});
  previewItems=parsed;
  render();
  setTimeout(()=>{const pb=document.querySelector('.preview-box');if(pb)pb.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}

function confirmarPreview(loja){
  if(!previewItems.length)return;
  let novos=0,atualizados=0;
  previewItems.forEach(item=>{
    const idx=estado[loja].findIndex(e=>e.nome.toLowerCase().trim()===item.nome.toLowerCase().trim()&&e.unidade===item.unidade);
    if(idx>=0){estado[loja][idx].qtd+=item.qtd;atualizados++;}
    else{estado[loja].push({...item});novos++;}
  });
  previewItems=[];draftTexts[loja]='';
  salvar(true);updateBadges();render();

// ── AÇÕES COMPRAS ──
function gerarConsolidado(){
  const total=LOJAS.reduce((a,l)=>a+estado[l].length,0);
  // Se todas as lojas estão vazias, zera o consolidado
  if(!total){
    if(consolidado.length){
      const jaSalvo=historico.some(h=>h.tipo==='compra'&&h.dataTs&&(Date.now()-h.dataTs)<7*24*60*60*1000);
      if(!jaSalvo){
        if(!confirm('Todas as listas estão vazias.\nA lista consolidada atual NÃO foi salva no histórico.\nDeseja zerar mesmo assim?'))return;
      }
      consolidado=[];checklist={};
      salvar(true);render();
      showToast('Consolidado zerado.');
    }else{
      showToast('Adicione itens nas lojas primeiro.',true);
    }
    return;
  }

  // Verificar se há checks ou preços já preenchidos
  const temDados=Object.values(checklist).some(v=>v.status==='got'||v.status==='pending'||(v.preco&&v.preco>0));

  if(temDados){
    // Perguntar o que fazer
    const opcao=confirm(
      'Você tem checks e/ou preços já preenchidos na lista de compras.\n\n' +
      '✓ OK → Preservar checks e preços dos produtos que continuam\n' +
      '✗ Cancelar → Manter como está (não atualizar agora)'
    );
    if(!opcao)return;

    // Gerar novo consolidado preservando dados existentes
    const novoConsolidado=consolidarLocalmente();
    const novoChecklist={};

    novoConsolidado.forEach((novoItem,novoIdx)=>{
      // Buscar se esse produto já existia no consolidado anterior
      const antigoIdx=consolidado.findIndex(antigo=>
        norm(antigo.nome)===norm(novoItem.nome)&&antigo.unidade===novoItem.unidade
      );
      if(antigoIdx>=0&&checklist[antigoIdx]){
        // Preservar check e preço do item anterior
        novoChecklist[novoIdx]={...checklist[antigoIdx]};
      }
    });

    consolidado=novoConsolidado;
    checklist=novoChecklist;
    salvar(true);render();
    const preservados=Object.keys(novoChecklist).length;
    showToast(`✓ ${consolidado.length} produtos · ${preservados} check${preservados!==1?'s':''} preservado${preservados!==1?'s':''}`);
  }else{
    // Sem dados preenchidos — atualiza direto
    consolidado=consolidarLocalmente();checklist={};
    salvar(true);render();
    showToast(`✓ ${consolidado.length} produtos consolidados!`);
  }
}

function toggleCheck(idx){
  if(!checklist[idx])checklist[idx]={status:'',preco:0};
  // Se está pendente, não deixa marcar como comprado direto — avisa
  if(checklist[idx].status==='pending'){
    showToast('Remova dos pendentes primeiro (⚠️).',true);return;
  }
  // 2 estados limpos: '' <-> 'got'
  checklist[idx].status=checklist[idx].status==='got'?'':'got';
  const got=checklist[idx].status==='got';
  const ci=document.getElementById('ci-'+idx);
  if(ci){
    ci.className='citem'+(got?' got':'');
    const circle=ci.querySelector('.check-circle');
    if(circle)circle.textContent=got?'✓':'';
  }
  updateProgresso();
  salvar();
}

function marcarPendente(idx){
  if(!checklist[idx])checklist[idx]={status:'',preco:0};
  const jaPendente=checklist[idx].status==='pending';
  checklist[idx].status=jaPendente?'':'pending';

  if(aba==='pendentes'){
    // Na aba pendentes: re-render completo ao remover
    updateBadgePendentes();
    salvar(true);render();
  } else {
    // Na aba compras: esconder o card se marcou pendente, mostrar se desmarcou
    const ci=document.getElementById('ci-'+idx);
    if(ci){
      if(!jaPendente){
        // Marcou como pendente — esconde da lista de compras com animação
        ci.style.transition='opacity .25s,max-height .3s';
        ci.style.opacity='0';
        ci.style.maxHeight=ci.offsetHeight+'px';
        setTimeout(()=>{ci.style.maxHeight='0';ci.style.margin='0';ci.style.padding='0';ci.style.border='0';},250);
        setTimeout(()=>{ci.style.display='none';},550);
      } else {
        // Desmarcou — re-render para mostrar de volta
        salvar(true);render();return;
      }
    }
    updateProgresso();
    updateBadgePendentes();
    salvar();
  }
  if(!jaPendente)showToast('⚠️ Movido para Pendentes!');
  else showToast('✓ Removido dos pendentes.');
}

function updatePreco(idx,val){
  if(!checklist[idx])checklist[idx]={status:'',preco:0};
  checklist[idx].preco=parseFloat(val)||0;
  const q=consolidado[idx]?.total||1;
  const p=checklist[idx].preco;
  const sub=document.getElementById('sub-'+idx);
  if(sub)sub.textContent=p?'= R$ '+(p*q).toFixed(2).replace('.',','):'';
  let t=0;
  consolidado.forEach((_,i)=>{const pi=checklist[i]?.preco||0;t+=pi*consolidado[i].total;});
  const tv=document.getElementById('total-val');
  if(tv)tv.textContent='R$ '+t.toFixed(2).replace('.',',');
  clearTimeout(window._pt);window._pt=setTimeout(()=>salvar(),800);
}

function updateBadgePendentes(){
  // Se consolidado vazio, limpar checklist orphan e zerar badge
  if(!consolidado.length&&Object.keys(checklist).length){
    checklist={};
  }
  const count=consolidado.filter((_,i)=>checklist[i]?.status==='pending').length;
  const el=document.getElementById('n-pendentes');
  if(el)el.textContent=count;
}

function updateProgresso(){
  const total=consolidado.length;
  const done=consolidado.filter((_,i)=>checklist[i]?.status==='got').length;
  const pending=consolidado.filter((_,i)=>checklist[i]?.status==='pending').length;
  const tratados=done+pending;
  const pct=total?Math.round(tratados/total*100):0;
  const restantes=total-tratados;
  // Atualizar barra
  const pf=document.getElementById('prog-fill');if(pf)pf.style.width=pct+'%';
  // Atualizar percentual
  const pp=document.getElementById('prog-pct');if(pp)pp.textContent=pct+'%';
  // Atualizar segmentos
  const pc=document.getElementById('prog-comprados');if(pc)pc.textContent=done+' comprado'+(done!==1?'s':'');
  const ppd=document.getElementById('prog-pendentes-count');if(ppd)ppd.textContent=pending+' pendente'+(pending!==1?'s':'');
  const pr=document.getElementById('prog-restantes');if(pr)pr.textContent=restantes+' restante'+(restantes!==1?'s':'');
  updateBadgePendentes();
  if(done===total&&total>0){
    let t=0;consolidado.forEach((_,i)=>{const p=checklist[i]?.preco||0;t+=p*consolidado[i].total;});
    if(!document.querySelector('.done-banner')){
      const btn=document.querySelector('.btn-salvar-compra');
      if(btn){const d=document.createElement('div');d.className='done-banner';d.textContent=`🎉 Tudo comprado! Total: R$ ${t.toFixed(2).replace('.',',')}`;btn.before(d);}
    }
  }
}

function copiarPendentes(){
  const pendentes=consolidado.filter((_,i)=>checklist[i]?.status==='pending');
  if(!pendentes.length){showToast('Nenhum item pendente.',true);return;}
  let txt=`⚠️ LISTA DE PENDENTES — ${getSemana()}\n\n`;
  const byCat={};
  pendentes.forEach(it=>{if(!byCat[it.categoria])byCat[it.categoria]=[];byCat[it.categoria].push(it);});
  const catOrder=Object.keys(CATS);
  Object.keys(byCat).sort((a,b)=>catOrder.indexOf(a)-catOrder.indexOf(b)).forEach(cat=>{
    const cd=CATS[cat]||{icon:'🏪'};
    txt+=`${cd.icon} ${cat}\n`;
    byCat[cat].forEach(it=>{txt+=`• ${it.nome} — ${it.total} ${it.unidade}\n`;});
    txt+='\n';
  });
  navigator.clipboard.writeText(txt).then(()=>showToast('✓ Lista de pendentes copiada!')).catch(()=>showToast('Erro ao copiar.',true));
}

function salvarCompraNoHistorico(){
  let t=0;
  const itens=consolidado.map((it,i)=>{
    const p=checklist[i]?.preco||0;
    const s=p*it.total;
    t+=s;
    return{...it,preco:p,subtotal:s,qtd:it.total,status:checklist[i]?.status||''};
  });
  const pendentes=itens.filter(it=>it.status==='pending');
  historico.push({id:'c'+Date.now(),dataTs:Date.now(),loja:null,tipo:'compra',itens,total:t,pendentes:pendentes.length});
  // Registrar histórico de preços
  registrarPrecos(itens.filter(it=>it.preco>0));
  salvar(true);
  const msg=pendentes.length?`✓ Salvo! ${pendentes.length} item${pendentes.length!==1?'s':''} pendente${pendentes.length!==1?'s':''}.`:'✓ Compra salva no histórico!';

function abrirEditarItem(loja,idx,isEstoque=false,estoqueType='casa'){

  if(!item&&!isEstoque)return;
  fecharModal();

  const catGrid=Object.entries(CATS).map(([cat,d])=>`
    <div class="modal-cat-item ${window._catSelecionada===cat?'selected':''}" onclick="selecionarCatModal('${cat}')">
      <div class="modal-cat-icon">${d.icon}</div>
      <div class="modal-cat-name">${cat}</div>
      ${window._catSelecionada===cat?'<span class="modal-cat-check">✓</span>':''}
    </div>`).join('');

  const modal=document.createElement('div');
  modal.className='modal-overlay';modal.id='modalOverlay';
  modal.innerHTML=`<div class="modal-box">
    <div class="modal-title">${isEstoque?'📦 Adicionar ao Estoque':'✎ Editar Item'}<span class="modal-close" onclick="fecharModal()">✕</span></div>
    <div class="modal-field"><div class="modal-field-label">Nome do produto</div><input class="modal-input" id="editNome" type="text" value="${item.nome}" placeholder="Nome do produto"></div>
    <div class="modal-field-row">

      <div class="modal-field" style="flex:1"><div class="modal-field-label">Unidade</div><select class="modal-input" id="editUnit">${['un','kg','g','L','ml','cx','pct','dz'].map(u=>`<option ${item.unidade===u?'selected':''}>${u}</option>`).join('')}</select></div>
    </div>
    <div class="modal-field"><div class="modal-field-label">Categoria</div><div class="modal-cat-grid" id="catGrid">${catGrid}</div></div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-btn-save" onclick="salvarEdicao('${loja}',${idx},${isEstoque})">✓ Salvar</button>
    </div>
  </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)fecharModal();});

  window._catSelecionada=cat;
  document.querySelectorAll('.modal-cat-item').forEach(el=>{
    const nome=el.querySelector('.modal-cat-name')?.textContent;

    if(chk)chk.remove();
    if(sel){const s=document.createElement('span');s.className='modal-cat-check';s.textContent='✓';el.appendChild(s);}
  });
}

    (h.itens||[]).forEach(it=>{
      const cat=it.categoria||'Mercearia';
      const preco=it.preco||0;
      const qtdTotal=it.qtd||it.total||1;
      semanas[s].cats[cat]=(semanas[s].cats[cat]||0)+(preco*qtdTotal);

  const semAnterior=semanasOrdem.find(s=>s!==semAtual);
  const totalAnterior=semAnterior?semanas[semAnterior].total:null;
  const delta=totalAnterior?((totalAtual-totalAnterior)/totalAnterior*100):null;
  const totalCompras=historico.filter(h=>h.tipo==='compra').length;

  const catsAtual=semanas[semAtual]?.cats||{};
  const lojasAtual=semanas[semAtual]?.lojas||{};
  const maxCat=Math.max(...Object.values(catsAtual),1);
  const maxLoja=Math.max(...Object.values(lojasAtual),1);
  const catsOrdenadas=Object.entries(catsAtual).sort((a,b)=>b[1]-a[1]);
  const LCORES_DASH={viena:'#6a1b9a',mirella:'#bf360c',montana:'#01579b',flash:'#2e7d32'};

  let html=`

      </div>
      <div class="kpi-card">
        <div class="kpi-label">📋 Total de compras</div>
        <div class="kpi-value">${totalCompras}</div>
        <div class="kpi-sub kpi-eq">${semanasOrdem.length} semana${semanasOrdem.length!==1?'s':''} registrada${semanasOrdem.length!==1?'s':''}</div>
      </div>
    </div>
  </div>`;

  if(catsOrdenadas.length){
    html+=`<div class="dash-section">
      <div class="dash-section-title">📦 Gastos por categoria — semana atual</div>`;
    catsOrdenadas.forEach(([cat,val])=>{
      const cd=CATS[cat]||{icon:'🏪',cor:'#94a3b8'};
      const pct=Math.round(val/maxCat*100);
      html+=`<div class="cat-bar-item">
        <div class="cat-bar-label">${cd.icon} ${cat}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${cd.cor}"></div></div>
        <div class="cat-bar-val">R$ ${val.toFixed(2).replace('.',',')}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Breakdown por loja
  const totalLojas=Object.values(lojasAtual).reduce((a,b)=>a+b,0);
  if(totalLojas>0){
    html+=`<div class="dash-section">
      <div class="dash-section-title">🏪 Gastos por loja — semana atual</div>`;
    LOJAS.forEach(l=>{
      const val=lojasAtual[l]||0;
      const pct=Math.round(val/maxLoja*100);
      const cor=LCORES_DASH[l]||'#546e7a';
      html+=`<div class="cat-bar-item">
        <div class="cat-bar-label">${LNOMES[l]}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${cor}"></div></div>
        <div class="cat-bar-val">R$ ${val.toFixed(2).replace('.',',')}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(semanasOrdem.length){
    html+=`<div class="dash-section">
      <div class="dash-section-title">📅 Histórico por semana</div>`;
    semanasOrdem.slice(0,8).forEach((sem,i)=>{
      const proxSem=semanasOrdem[i+1];
      const d=proxSem?((semanas[sem].total-semanas[proxSem].total)/semanas[proxSem].total*100):null;
      html+=`<div class="semana-row">
        <div class="semana-label">${sem}</div>

        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(!semanasOrdem.length){
    html+=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Nenhum dado ainda.<br>Salve uma compra com valores para ver o dashboard.</div></div>`;
  }

  html+=`<button class="btn-relatorio" onclick="gerarRelatorio()">⋯ Gerar Relatório Completo</button>`;
  m.innerHTML=html;
}

function getSemanaTs(ts){
  const d=new Date(ts);
  const jan1=new Date(d.getFullYear(),0,1);
  const wk=Math.ceil((((d-jan1)/86400000)+jan1.getDay()+1)/7);
  return`Semana ${wk}/${d.getFullYear()}`;
}

function gerarRelatorio(){
  const semanas={};
  historico.filter(h=>h.tipo==='compra').forEach(h=>{
    const s=getSemanaTs(h.dataTs);
    if(!semanas[s])semanas[s]={total:0,cats:{},lojas:{viena:0,mirella:0,montana:0,flash:0}};
    semanas[s].total+=h.total||0;
    (h.itens||[]).forEach(it=>{
      const cat=it.categoria||'Mercearia';
      const preco=it.preco||0;
      const qtdTotal=it.qtd||it.total||1;
      semanas[s].cats[cat]=(semanas[s].cats[cat]||0)+(preco*qtdTotal);
      LOJAS.forEach(l=>{
        const qtdLoja=(it.lojas||{})[l]||0;
        if(qtdLoja>0) semanas[s].lojas[l]=(semanas[s].lojas[l]||0)+(preco*qtdLoja);
      });
    });
  });
  const semanasOrdem=Object.keys(semanas).sort((a,b)=>b.localeCompare(a));
  if(!semanasOrdem.length){showToast('Nenhum dado para relatório.',true);return;}

  let txt=`📊 RELATÓRIO DE COMPRAS — ListaMercado\n${'─'.repeat(40)}\n\n`;
  semanasOrdem.forEach(sem=>{
    txt+=`📅 ${sem}\n`;
    txt+=`   Total geral: R$ ${semanas[sem].total.toFixed(2).replace('.',',')}\n`;
    // Por loja
    txt+=`\n   🏪 Por loja:\n`;
    LOJAS.forEach(l=>{
      const val=semanas[sem].lojas[l]||0;
      if(val>0) txt+=`      ${LNOMES[l]}: R$ ${val.toFixed(2).replace('.',',')}\n`;
    });
    // Por categoria
    txt+=`\n   📦 Por categoria:\n`;
    Object.entries(semanas[sem].cats).sort((a,b)=>b[1]-a[1]).forEach(([cat,val])=>{
      const cd=CATS[cat]||{icon:'🏪'};
      txt+=`      ${cd.icon} ${cat}: R$ ${val.toFixed(2).replace('.',',')}\n`;
    });
    txt+='\n'+'─'.repeat(40)+'\n\n';
  });
  navigator.clipboard.writeText(txt).then(()=>showToast('✓ Relatório copiado!')).catch(()=>showToast('Erro ao copiar.',true));
}

// ── HISTÓRICO DE PREÇOS ──
function normPreco(nome){
  return(nome||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
}
function registrarPrecos(itens){
  const sem=getSemana();
  itens.forEach(it=>{
    if(!it.preco||it.preco<=0)return;
    const key=normPreco(it.nome);
    if(!precoHistorico[key])precoHistorico[key]=[];
    // Não duplicar mesma semana
    const jaTemSemana=precoHistorico[key].find(p=>p.semana===sem);
    if(jaTemSemana){jaTemSemana.preco=it.preco;}
    else{precoHistorico[key].unshift({semana:sem,preco:it.preco,dataTs:Date.now()});}
    // Guardar só últimas 12 semanas
    if(precoHistorico[key].length>12)precoHistorico[key]=precoHistorico[key].slice(0,12);
  });
}
function getUltimoPreco(nome){
  const key=normPreco(nome);
  const hist=precoHistorico[key];
  if(!hist||hist.length===0)return null;
  const sem=getSemana();
  // Pegar o preço mais recente que não seja da semana atual
  const anterior=hist.find(p=>p.semana!==sem);
  const atual=hist.find(p=>p.semana===sem);
  return{atual:atual?.preco||null,anterior:anterior?.preco||null,hist};
}

function diasAteVencer(validadeISO){
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const venc=new Date(validadeISO+'T00:00:00');
  return Math.round((venc-hoje)/86400000);
}
function statusValidade(dias){
  if(dias<=3)return'urgente';
  if(dias<=7)return'atencao';
  return'ok';
}
function updateBadgeValidades(){
  const count=validades.filter(v=>diasAteVencer(v.validade)<=7).length;
  const el=document.getElementById('n-validades');
  if(el)el.textContent=count;
}

function renderValidades(m){
  const q=buscas.validades||'';
  const ordenados=[...validades].sort((a,b)=>diasAteVencer(a.validade)-diasAteVencer(b.validade));
  const filtrados=q?ordenados.filter(v=>v.nome.toLowerCase().includes(q.toLowerCase())):ordenados;
  const urgentes=validades.filter(v=>diasAteVencer(v.validade)<=3).length;
  const atencao=validades.filter(v=>{const d=diasAteVencer(v.validade);return d>3&&d<=7;}).length;

  let html=`
  <div class="val-header">
    <div class="val-header-left">
      <strong>⏰ Controle de Validades</strong>
      <span>${validades.length} produto${validades.length!==1?'s':''} cadastrado${validades.length!==1?'s':''}${urgentes?` · 🔴 ${urgentes} urgente${urgentes!==1?'s':''}`:''}${atencao?` · 🟡 ${atencao} atenção`:''}</span>
    </div>
    <button class="btn-add-val" onclick="abrirAddValidade()">+ Adicionar</button>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search-validades" class="search-input" type="text" placeholder="Pesquisar produto..." value="${q}" oninput="filtrarValidades(this.value)">
    ${q?`<span class="search-clear" onclick="limparBuscaValidades()">✕</span>`:''}
  </div>`;

  if(validades.length===0){
    html+=`<div class="empty"><div class="empty-icon">⏰</div><div class="empty-text">Nenhum produto com validade cadastrada.<br>Adicione produtos que vencem rápido<br>(presunto, queijo, iogurte...) para receber alertas.</div></div>`;
  }else if(filtrados.length===0){
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum resultado para "<b>${q}</b>".</div></div>`;
  }else{
    filtrados.forEach(v=>{
      const dias=diasAteVencer(v.validade);
      const status=statusValidade(dias);
      const dataFmt=new Date(v.validade+'T00:00:00').toLocaleDateString('pt-BR');
      const diasLabel=dias<0?'VENCIDO':dias===0?'HOJE':dias===1?'amanhã':(dias+' dias');
      html+=`<div class="val-item ${status}">
        <div class="val-dot ${status}"></div>
        <div class="val-info">
          <div class="val-nome">${v.nome}</div>
          <div class="val-loja">${v.loja?(LNOMES[v.loja]||v.loja):'—'} · ${v.qtd} ${v.unidade||'un'}</div>
          <div class="val-data">Vence em ${dataFmt}</div>
        </div>
        <div class="val-dias">
          <div class="val-dias-num ${status}">${dias<0?'⚠️':dias}</div>
          <div class="val-dias-label">${diasLabel}</div>
        </div>
        <button class="btn-rm" onclick="remValidade('${v.id}')">✕</button>
      </div>`;
    });
  }
  m.innerHTML=html;
  updateBadgeValidades();
}

// ── SIDEBAR ──
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebarOverlay');
  const btn=document.getElementById('btnMenu');
  const isOpen=sb.classList.contains('open');
  if(isOpen){closeSidebar();}else{
    sb.classList.add('open');
    ov.classList.add('open');
    btn.classList.add('open');
  }
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('btnMenu').classList.remove('open');
}



function openSidebar(){['sidebar','sidebarOverlay','btnMenu'].forEach(id=>document.getElementById(id)?.classList.add('open'));}

function toggleSubmenu(){
  const isOpen=document.getElementById('submenu')?.classList.contains('open');
  if(isOpen){closeSubmenu();}else{
    document.getElementById('submenu')?.classList.add('open');
    document.getElementById('submenuOverlay')?.classList.add('open');
  }
}
function closeSubmenu(){
  document.getElementById('submenu')?.classList.remove('open');
  document.getElementById('submenuOverlay')?.classList.remove('open');
}
function navToSub(l){closeSubmenu();navTo(l);}
function updateBottomTabs(l){
  const LOJAS_LIST=['viena','mirella','montana','flash'];
  document.querySelectorAll('.bottom-tab').forEach(t=>t.classList.remove('active'));
  if(l==='dash')document.getElementById('bt-dash')?.classList.add('active');
  else if(LOJAS_LIST.includes(l))document.getElementById('bt-listas')?.classList.add('active');
  else if(['compras','pendentes'].includes(l))document.getElementById('bt-compras')?.classList.add('active');
  else if(['estoque','estoque-flash','validades'].includes(l))document.getElementById('bt-gestao')?.classList.add('active');
  else document.getElementById('bt-mais')?.classList.add('active');
  document.querySelectorAll('.submenu-item').forEach(t=>t.classList.toggle('active',t.dataset.l===l));
}
